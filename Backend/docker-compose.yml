version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: meeting_room_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: booking_db
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: meeting_room_pma
    restart: always
    ports:
      - "8080:80" 
    environment:
      PMA_HOST: db 
      MYSQL_ROOT_PASSWORD: password123
    depends_on:
      - db